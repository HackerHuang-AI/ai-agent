server.port=8090
app.environment=test
app.debug=true

# ==================== 日志配置 ====================
logging.file.path=logs
logging.level.root=INFO
logging.level.com.ai.agent=DEBUG

# ==================== Nacos（通过 namespace 隔离 test 环境）====================
spring.cloud.nacos.config.enabled=true
spring.cloud.nacos.config.server-addr=127.0.0.1:8847
spring.cloud.nacos.config.namespace=test
spring.cloud.nacos.discovery.enabled=true
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8847
spring.cloud.nacos.discovery.namespace=test

# ==================== Dubbo 注册中心 ====================
dubbo.registry.address=nacos://${spring.cloud.nacos.discovery.server-addr}

# ==================== Vault 配置中心 ====================
spring.cloud.vault.enabled=true
spring.cloud.vault.host=127.0.0.1
spring.cloud.vault.port=8200
spring.cloud.vault.scheme=http
spring.cloud.vault.authentication=APPROLE
spring.cloud.vault.app-role.role-id=
spring.cloud.vault.app-role.secret-id=${VAULT_SECRET_ID:}
spring.cloud.vault.app-role.app-role-path=approle
spring.cloud.vault.database.enabled=true
spring.cloud.vault.database.role=ai-agent-role
spring.cloud.vault.database.backend=database

# ==================== 数据库连接（通过 ProxySQL 代理）====================
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.url=jdbc:mysql://127.0.0.1:6033/ai_agent?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

