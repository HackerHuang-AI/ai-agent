# 测试环境端口
server.port=8091
# 环境标识
app.environment=test
app.debug=true


# ==================== 日志配置 ====================
logging.file.path=logs
logging.level.root=INFO
logging.level.com.ai.agent=DEBUG
logging.level.okhttp3=INFO


# ==================== Nacos 配置中心 ====================
spring.cloud.nacos.config.server-addr=127.0.0.1:8847
# spring.cloud.nacos.config.namespace=

# ==================== Nacos 服务注册与发现 ====================
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8847
# spring.cloud.nacos.discovery.namespace=

# ==================== 数据库连接（通过 ProxySQL 代理）====================
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.url=jdbc:mysql://127.0.0.1:6033/ai_agent?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

