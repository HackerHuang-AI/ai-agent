# 应用名称，同时作为服务注册到 Nacos 的服务名
spring.application.name=ai-agent

# 所有接口的 URL 前缀，例如 /ai-agent/xxx
server.servlet.context-path=/ai-agent

# 激活的环境配置（dev/test/stag/prod）
# 对应 config/{profile}/application.properties
spring.profiles.active=dev
# 加载环境配置文件 + Nacos 配置（逗号分隔，两者都生效）
spring.config.import=optional:classpath:config/${spring.profiles.active}/application.properties,optional:nacos:ai-agent.properties

# ==================== Nacos 配置中心 ====================
# NacosConfig 索引 DataId：记录本服务关注的所有业务 DataId 列表（properties 格式，key=dataIds）
nacos.index-data-id=ai-agent-index.properties
# 是否启用 Nacos 配置中心
spring.cloud.nacos.config.enabled=true
# 关闭 spring.config.import 的强制校验，避免启动时报错（各环境自行声明 import）
spring.cloud.nacos.config.import-check.enabled=false
# 配置文件格式
spring.cloud.nacos.config.group=AI_AGENT_GROUP
spring.cloud.nacos.config.file-extension=properties

# ==================== Nacos 服务注册与发现 ====================
spring.cloud.nacos.discovery.enabled=true
spring.cloud.nacos.discovery.service=${spring.application.name}
spring.cloud.nacos.discovery.group=AI_AGENT_GROUP

# ==================== i18n 国际化 ====================
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# ==================== Vault 配置中心 ====================
spring.cloud.vault.host=127.0.0.1
spring.cloud.vault.port=8200
spring.cloud.vault.scheme=http
spring.cloud.vault.authentication=APPROLE
spring.cloud.vault.app-role.role-id=
spring.cloud.vault.app-role.secret-id=${VAULT_SECRET_ID:}
spring.cloud.vault.app-role.app-role-path=approle
spring.cloud.vault.database.enabled=true
spring.cloud.vault.database.role=ai-agent-role
spring.cloud.vault.database.backend=database

