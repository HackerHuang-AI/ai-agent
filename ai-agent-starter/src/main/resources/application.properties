# 应用名称，同时作为服务注册到 Nacos 的服务名
spring.application.name=ai-agent

# 所有接口的 URL 前缀，例如 /ai-agent/xxx
server.servlet.context-path=/ai-agent

# 激活的环境配置（dev/test/stag/prod）
# 由 Maven profile 在打包时注入，mvn package -P dev/test/stag/prod
spring.profiles.active=@spring.profiles.active@

# ==================== Nacos 公共配置（server-addr/namespace 由各环境 profile 注入）====================
# 关闭启动时 Nacos 配置连通性检查，避免本地无 Nacos 时启动失败
spring.cloud.nacos.config.import-check.enabled=false
# 配置分组，与 Nacos 控制台保持一致
spring.cloud.nacos.config.group=AI_AGENT_GROUP
# 配置文件格式
spring.cloud.nacos.config.file-extension=properties
# 索引配置文件 DataId，用于动态加载多个子配置
nacos.index-data-id=ai-agent-index.properties
# 服务注册名称，复用 spring.application.name
spring.cloud.nacos.discovery.service=${spring.application.name}
# 服务发现分组，与配置分组保持一致
spring.cloud.nacos.discovery.group=AI_AGENT_GROUP

# ==================== i18n 国际化 ====================
# 资源文件路径前缀，对应 resources/i18n/messages_xx.properties
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
# 禁止回退到 JVM 默认 Locale，由 Accept-Language 请求头决定语言
spring.messages.fallback-to-system-locale=false

# ==================== MyBatis-Plus ====================
# 数据库字段下划线自动转驼峰
mybatis-plus.configuration.map-underscore-to-camel-case=true
# 逻辑删除字段名
mybatis-plus.global-config.db-config.logic-delete-field=valid
# 逻辑删除值（1=已删除）
mybatis-plus.global-config.db-config.logic-delete-value=1
# 逻辑未删除值（0=正常）
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ==================== Dubbo 公共配置 ====================
# 应用名，与服务注册名保持一致
dubbo.application.name=${spring.application.name}
# 使用 Triple 协议（gRPC 兼容）
dubbo.protocol.name=tri
# Triple 协议端口
dubbo.protocol.port=20890
# Dubbo 服务注册分组
dubbo.registry.group=AI_AGENT_GROUP
# Dubbo 接口扫描包路径
dubbo.scan.base-packages=com.ai.agent

