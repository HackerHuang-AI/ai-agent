# 服务端口
server.port=8090
# 环境标识，用于日志和监控区分
app.environment=dev
# 开启调试模式（影响部分组件的详细输出）
app.debug=true

# ==================== 日志配置 ====================
# 日志文件输出目录
logging.file.path=logs
# 根日志级别
logging.level.root=INFO
# 业务代码日志级别（dev 环境开 DEBUG 方便排查）
logging.level.com.ai.agent=DEBUG
# OkHttp 日志级别（INFO 可看到请求/响应摘要）
logging.level.okhttp3=INFO
# Dubbo 日志级别
logging.level.org.apache.dubbo=INFO

# ==================== Nacos（本地可不启动，server-addr 填占位即可）====================
spring.cloud.nacos.config.server-addr=127.0.0.1:8848
# 本地开发使用 dev 命名空间隔离，按需取消注释并填写实际 namespace ID
# spring.cloud.nacos.config.namespace=ai-agent-dev
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
# spring.cloud.nacos.discovery.namespace=ai-agent-dev

# ==================== Dubbo（本地关闭注册，避免污染注册中心）====================
dubbo.registry.address=nacos://127.0.0.1:8848

# ==================== Vault（本地禁用，敏感配置通过其他方式注入）====================
spring.cloud.vault.enabled=false

# ==================== 数据库（本地禁用，避免缺少数据源配置时启动报错）====================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration

