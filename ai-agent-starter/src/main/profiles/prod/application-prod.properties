# 服务端口
server.port=8080
# 环境标识，用于日志和监控区分
app.environment=prod
# 关闭调试模式
app.debug=false

# ==================== 日志配置 ====================
# 日志文件输出目录
logging.file.path=logs
# 根日志级别（prod 只保留 WARN 及以上）
logging.level.root=WARN
# 业务代码日志级别
logging.level.com.ai.agent=INFO
# OkHttp 日志级别
logging.level.okhttp3=WARN
# Dubbo 日志级别
logging.level.org.apache.dubbo=WARN

# ==================== Nacos（prod 环境，通过 namespace 隔离）====================
# Nacos 配置中心地址
spring.cloud.nacos.config.server-addr=127.0.0.1:8848
# prod 命名空间 ID，填写 Nacos 控制台对应 namespace ID
# spring.cloud.nacos.config.namespace=ai-agent-prod
# Nacos 服务发现地址
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
# spring.cloud.nacos.discovery.namespace=ai-agent-prod

# ==================== Dubbo 注册中心 ====================
# 使用 Nacos 作为 Dubbo 注册中心
dubbo.registry.address=nacos://${spring.cloud.nacos.discovery.server-addr}

# ==================== Vault（prod 启用，敏感配置由 Vault 动态注入）====================
spring.cloud.vault.enabled=true
# Vault 服务地址
spring.cloud.vault.host=127.0.0.1
spring.cloud.vault.port=8200
spring.cloud.vault.scheme=http
# 使用 AppRole 认证方式
spring.cloud.vault.authentication=APPROLE
# Role ID（静态，写在配置里）
spring.cloud.vault.app-role.role-id=
# Secret ID（敏感，通过环境变量 VAULT_SECRET_ID 注入）
spring.cloud.vault.app-role.secret-id=${VAULT_SECRET_ID:}
spring.cloud.vault.app-role.app-role-path=approle
# 开启数据库动态凭证（Vault 自动生成 DB 用户名/密码）
spring.cloud.vault.database.enabled=true
spring.cloud.vault.database.role=ai-agent-role
spring.cloud.vault.database.backend=database

# ==================== 数据库连接（通过 ProxySQL 代理，实际地址由 Vault 注入）====================
# 最小空闲连接数（prod 适当调高）
spring.datasource.hikari.minimum-idle=5
# 最大连接池大小
spring.datasource.hikari.maximum-pool-size=20
# 获取连接超时时间（ms）
spring.datasource.hikari.connection-timeout=30000
# 连接最大空闲时间（ms）
spring.datasource.hikari.idle-timeout=600000
# 通过 ProxySQL（6033 端口）代理访问 MySQL
spring.datasource.url=jdbc:mysql://127.0.0.1:6033/ai_agent?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

